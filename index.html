<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Darts Checkout Training</title>
  <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col justify-between font-sans text-slate-100 antialiased selection:bg-emerald-500/30">
  <nav class="bg-slate-900/80 backdrop-blur-md p-4 sticky top-0 z-50 border-b border-slate-800/60 shadow-lg"><div class="max-w-6xl mx-auto flex justify-between items-center"><a href="#" class="text-lg font-black tracking-wider bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent flex items-center gap-2"><span>🧠</span> DARTS CHECKOUT PRO</a></div></nav>
  <main class="flex-grow flex items-center justify-center p-4 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900/60 via-slate-950 to-slate-950"><div id="root" class="w-full flex justify-center relative z-10"><div class="bg-slate-900/90 backdrop-blur-lg p-6 sm:p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border border-slate-800/80 relative overflow-hidden"><h1 class="text-2xl font-black text-white tracking-tight mb-1 flex justify-center items-center gap-2">🎯 Finish Trainer</h1><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-6">Alle finishes van 2 t/m 170</p><div class="grid grid-cols-2 gap-3 mb-6"><div class="bg-slate-950/60 border border-slate-800/50 rounded-2xl p-3 flex flex-col items-center justify-center"><span class="text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-0.5">Totaal Goed</span><span id="correctCounter" class="text-xl font-black text-emerald-400">0</span></div><div class="bg-slate-950/60 border border-slate-800/50 rounded-2xl p-3 flex flex-col items-center justify-center"><span class="text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-0.5">🔥 Win Streak</span><span id="streakCounter" class="text-xl font-black text-orange-400">0</span></div></div><div class="bg-slate-950/80 p-1.5 rounded-2xl border border-slate-800/60 grid grid-cols-3 gap-1 mb-6"><button onclick="setLevel('beginner')" id="btn-beg" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-slate-950 text-xs font-black py-2.5 rounded-xl transition duration-300 shadow-lg text-white">Beginner</button><button onclick="setLevel('intermediate')" id="btn-int" class="text-slate-400 hover:text-white text-xs font-bold py-2.5 rounded-xl transition duration-300">Gevorderd</button><button onclick="setLevel('expert')" id="btn-exp" class="text-slate-400 hover:text-white text-xs font-bold py-2.5 rounded-xl transition duration-300">Expert</button></div><div class="bg-gradient-to-b from-slate-950 to-slate-900 rounded-2xl py-8 mb-4 border border-slate-800/80 shadow-inner flex flex-col items-center justify-center relative overflow-hidden"><div class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">Gooi deze score uit:</div><div id="targetCheckout" class="text-6xl font-black text-white tracking-tighter">?</div><div id="dartCountLabel" class="text-[10px] text-emerald-400/90 font-black mt-2 tracking-wider uppercase bg-emerald-500/10 px-2.5 py-1 rounded-full border border-emerald-500/20">1 Dart Finish</div></div><button onclick="generateTrainingCheckout()" class="w-full bg-slate-950 border border-slate-800 hover:border-slate-700 hover:bg-slate-900 text-slate-200 font-bold py-3 px-4 rounded-xl transition duration-300 text-sm shadow-md mb-6">🔄 Volgend Getal</button><div class="border-t border-slate-800/60 pt-5"><p class="text-xs font-black text-slate-400 uppercase tracking-wider mb-3 text-left pl-1">Jouw werproute:</p><form id="guessForm" onsubmit="event.preventDefault(); checkUserGuess();" class="flex gap-2 mb-4"><input id="userGuess" type="text" placeholder="Bijv: T20 D20 of D16" class="w-full bg-slate-950 border border-slate-800/80 rounded-xl py-3 px-4 focus:outline-none focus:border-emerald-500 transition font-bold text-center text-white placeholder-slate-600 tracking-wide text-sm" autocomplete="off" required /><button type="submit" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-slate-950 font-black px-6 rounded-xl transition duration-300 text-sm tracking-wide">Check</button></form><div id="feedbackBox" class="hidden rounded-xl p-4 text-xs font-bold border transition duration-300 text-left"></div></div></div></div></main>
  <footer class="bg-slate-950 text-slate-600 text-center py-4 text-xs border-t border-slate-900/60 font-medium"><p>&copy; 2026 Darts Checkout Training. Alle rechten voorbehouden.</p></footer>
  <script>
    let currentLevel='beginner',currentTarget=0,lastTarget=0,correctCount=0,streakCount=0;const checkoutRoutes={};
    function buildDb(){
      for(let i=1;i<=20;i++){checkoutRoutes[i*2]="D"+i;if(i<=20){checkoutRoutes[i+40]="S"+i+" D20";checkoutRoutes[i*3+40]="T"+i+" D20";}}
      checkoutRoutes="BULLSEYE";checkoutRoutes="S11 D20";checkoutRoutes="S13 D20";checkoutRoutes="S15 D20";checkoutRoutes="S17 D20";
      checkoutRoutes="T20 S10 D20";checkoutRoutes="T20 T10 D10";checkoutRoutes="T20 T20 D10";checkoutRoutes="T20 T20 BULLSEYE";
    }
    window.onload=function(){buildDb();generateTrainingCheckout();};
    function setLevel(lvl){
      currentLevel=lvl;const ic="text-slate-400 hover:text-white text-xs font-bold py-2.5 rounded-xl transition duration-300",ac="bg-gradient-to-r from-emerald-500 to-teal-600 text-slate-950 text-xs font-black py-2.5 rounded-xl transition duration-300 shadow-lg text-white";
      document.getElementById('btn-beg').className=ic;document.getElementById('btn-int').className=ic;document.getElementById('btn-exp').className=ic;
      if(lvl==='beginner')document.getElementById('btn-beg').className=ac;if(lvl==='intermediate')document.getElementById('btn-int').className=ac;if(lvl==='expert')document.getElementById('btn-exp').className=ac;
      lastTarget=0;generateTrainingCheckout();
    }
    function generateTrainingCheckout(){
      const keys=Object.keys(checkoutRoutes).map(Number);let pool=[];
      if(currentLevel==='beginner'){pool=keys.filter(function(k){return !checkoutRoutes[k].includes(" ");});}
      else if(currentLevel==='intermediate'){pool=keys.filter(function(k){return checkoutRoutes[k].split(" ").length===2;});}
      else{pool=keys.filter(function(k){return checkoutRoutes[k].split(" ").length===3;});}
      let nt=pool[Math.floor(Math.random()*pool.length)];
      if(pool.length>1){while(nt===lastTarget){nt=pool[Math.floor(Math.random()*pool.length)];}}
      currentTarget=nt;lastTarget=currentTarget;document.getElementById('targetCheckout').textContent=currentTarget;
      document.getElementById('dartCountLabel').textContent=currentLevel==='beginner'?"1 Dart Finish":currentLevel==='intermediate'?"2 Dart Finish":"3 Dart Finish";
      document.getElementById('feedbackBox').classList.add('hidden');document.getElementById('userGuess').value='';document.getElementById('userGuess').focus();
    }
    function checkUserGuess(){
      const input=document.getElementById('userGuess').value.trim().toUpperCase().replace(/\s+/g,' '),ans=checkoutRoutes[currentTarget].toUpperCase(),fb=document.getElementById('feedbackBox');
      fb.classList.remove('hidden','bg-emerald-500/10','border-emerald-500/30','text-emerald-400','bg-rose-500/10','border-rose-500/30','text-rose-400');
      if(input===ans){fb.classList.add('bg-emerald-500/10','border-emerald-500/30','text-emerald-400');fb.innerHTML="🎉 <b>Correct!</b> Route vlekkeloos uitgevoerd.";correctCount++;streakCount++;}
      else{fb.classList.add('bg-rose-500/10','border-rose-500/30','text-rose-400');fb.innerHTML="❌ <b>Onjuist.</b> De juiste route is: <span class='underline font-black text-white ml-1'>"+checkoutRoutes[currentTarget]+"</span>";streakCount=0;}
      document.getElementById('correctCounter').textContent=correctCount;document.getElementById('streakCounter').textContent=streakCount;
    }
  </script>
</body>
</html>
