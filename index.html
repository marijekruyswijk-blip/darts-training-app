<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darts Checkout Training</title>
  <!-- Officiële Tailwind CSS via CDN -->
  <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between font-sans">

  <!-- Navigatiebalk -->
  <nav class="bg-slate-800 text-white p-4 shadow-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="#" class="text-xl font-bold tracking-wider">🧠 Darts Checkout Training</a>
    </div>
  </nav>

  <!-- Hoofdcontainer -->
  <main class="flex-grow flex items-center justify-center p-6">
    <div id="root" class="w-full flex justify-center">
      
      <!-- CHECKOUT TRAINING APP CARD -->
      <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-md w-full border border-gray-100">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-2">🎯 Finish Trainer</h1>
        <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest font-semibold">Leer finishen als een pro</p>

        <!-- Score & Streak Tellers -->
        <div class="bg-slate-50 border border-gray-200 rounded-xl p-3 mb-6 text-sm text-slate-700 font-bold flex justify-around shadow-inner">
          <div>🎯 Goed: <span id="correctCounter" class="text-green-600">0</span></div>
          <div>🔥 Reeks: <span id="streakCounter" class="text-orange-500">0</span></div>
        </div>

        <!-- Niveau Selector -->
        <div class="grid grid-cols-3 gap-2 mb-6">
          <button onclick="setLevel('beginner')" id="btn-beg" class="bg-blue-600 text-white text-xs font-bold py-2.5 rounded-lg transition shadow-sm">Beginner</button>
          <button onclick="setLevel('intermediate')" id="btn-int" class="bg-gray-200 text-gray-700 text-xs font-bold py-2.5 rounded-lg transition shadow-sm">Gevorderd</button>
          <button onclick="setLevel('expert')" id="btn-exp" class="bg-gray-200 text-gray-700 text-xs font-bold py-2.5 rounded-lg transition shadow-sm">Expert</button>
        </div>

        <!-- Target Box -->
        <div class="bg-slate-800 text-white rounded-2xl py-6 mb-6 shadow-md border-b-4 border-slate-900">
          <div class="text-xs text-slate-400 font-medium uppercase tracking-wider">Gooi deze score uit:</div>
          <div id="targetCheckout" class="text-5xl font-black mt-1 text-emerald-400">?</div>
          <div id="dartCountLabel" class="text-xs text-slate-400 mt-1 tracking-wider uppercase font-semibold">1 Dart Finish</div>
        </div>

        <!-- Volgend Target Knop -->
        <button onclick="generateTrainingCheckout()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md mb-6 hover:shadow-lg">
          🎯 Volgend Target
        </button>

        <!-- Antwoord invoeren sectie -->
        <div class="border-t border-gray-100 pt-4">
          <p class="text-sm font-semibold text-slate-700 mb-2">Typ de darts (gebruik spaties):</p>
          <form id="guessForm" onsubmit="event.preventDefault(); checkUserGuess();" class="flex gap-2 mb-4">
            <input id="userGuess" type="text" placeholder="Bijv: T20 D20 of D16" class="w-full border-2 border-gray-200 rounded-xl py-2 px-4 focus:outline-none focus:border-emerald-500 transition font-medium text-center" autocomplete="off" required />
            <button type="submit" class="bg-slate-800 hover:bg-slate-900 text-white px-6 rounded-xl font-bold transition shadow-sm">Check</button>
          </form>
          <div id="feedbackBox" class="hidden rounded-xl p-3 text-sm font-medium transition duration-300"></div>
        </div>

      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-slate-900 text-gray-400 text-center py-4 text-xs border-t border-slate-800">
    <p>&copy; 2026 Darts Checkout Training. Alle rechten voorbehouden.</p>
  </footer>

  <!-- Volledige JavaScript Logica -->
  <script>
    // --- STATE VARIABLES ---
    let currentLevel = 'beginner';
    let currentTarget = 0;
    let correctCount = 0;
    let streakCount = 0;

    // --- CHECKOUT DATABASE ---
    const checkoutRoutes = {
      2: "D1", 4: "D2", 8: "D4", 12: "D6", 16: "D8", 20: "D10", 24: "D12", 32: "D16", 36: "D18", 40: "D20", 50: "BULLSEYE",
      41: "S9 D16", 45: "S13 D16", 52: "S20 D16", 60: "S20 D20", 64: "T16 D8", 70: "T18 D8", 80: "T20 D10", 90: "T20 D15",
      100: "T20 D20", 110: "T20 S10 D20", 120: "T20 T20 D10", 130: "T20 T20 D5", 140: "T20 T20 D10", 150: "T20 T18 D18", 160: "T20 T20 D20", 170: "T20 T20 BULLSEYE"
    };

    // Automatisch opstarten zodra de pagina inlaadt
    window.onload = () => {
      generateTrainingCheckout();
    };

    // --- NIVEAU SWITCHER ---
    function setLevel(level) {
      currentLevel = level;
      
      // Reset de kleuren van de niveau-knoppen
      document.getElementById('btn-beg').className = "bg-gray-200 text-gray-700 text-xs font-bold py-2.5 rounded-lg transition shadow-sm";
      document.getElementById('btn-int').className = "bg-gray-200 text-gray-700 text-xs font-bold py-2.5 rounded-lg transition shadow-sm";
      document.getElementById('btn-exp').className = "bg-gray-200 text-gray-700 text-xs font-bold py-2.5 rounded-lg transition shadow-sm";

      // Activeer de kleur voor de geselecteerde knop
      if(level === 'beginner') document.getElementById('btn-beg').className = "bg-blue-600 text-white text-xs font-bold py-2.5 rounded-lg transition shadow-sm";
      if(level === 'intermediate') document.getElementById('btn-int').className = "bg-blue-600 text-white text-xs font-bold py-2.5 rounded-lg transition shadow-sm";
      if(level === 'expert') document.getElementById('btn-exp').className = "bg-blue-600 text-white text-xs font-bold py-2.5 rounded-lg transition shadow-sm";

      generateTrainingCheckout();
    }

    // --- RANDOM TARGET GENERATOR ---
    function generateTrainingCheckout() {
      const allKeys = Object.keys(checkoutRoutes).map(Number);
      let pool = [];

      // Filter de database op basis van het gekozen niveau
      if (currentLevel === 'beginner') {
        pool = allKeys.filter(k => k <= 50);
      } else if (currentLevel === 'intermediate') {
        pool = allKeys.filter(k => k > 50 && k < 100);
      } else {
        pool = allKeys.filter(k => k >= 100);
      }

      // Kies een willekeurige finish uit de gefilterde lijst
      currentTarget = pool[Math.floor(Math.random() * pool.length)];
      document.getElementById('targetCheckout').textContent = currentTarget;
      
      // Update het label (aantal darts)
      const label = document.getElementById('dartCountLabel');
      if(currentLevel === 'beginner') label.textContent = "1 Dart Finish";
      if(currentLevel === 'intermediate') label.textContent = "2 Dart Finish";
      if(currentLevel === 'expert') label.textContent = "3 Dart Finish";

      // Reset invoer en feedback
      document.getElementById('feedbackBox').classList.add('hidden');
      document.getElementById('userGuess').value = '';
      document.getElementById('userGuess').focus();
    }

    // --- ANTWOORD CONTROLEREN ---
    function checkUserGuess() {
      const userInput = document.getElementById('userGuess').value.trim().toUpperCase().replace(/\s+/g, ' ');
      const correctAnswer = checkoutRoutes[currentTarget].toUpperCase();
      const feedback = document.getElementById('feedbackBox');
      
      feedback.classList.remove('hidden', 'bg-green-50', 'text-green-700', 'bg-red-50', 'text-red-700');
      
      if(userInput === correctAnswer) {
        feedback.classList.add('bg-green-50', 'text-green-700');
        feedback.innerHTML = "🎉 <b>Correct!</b> Je kent je finishes perfect.";
        correctCount++;
        streakCount++;
      } else {
        feedback.classList.add('bg-red-50', 'text-red-700');
        feedback.innerHTML = "❌ <b>Onjuist.</b> De juiste route is: <b class='underline'>" + checkoutRoutes[currentTarget] + "</b>";
        streakCount = 0; // Reset de actieve reeks bij een fout antwoord
      }

      // Update de tellers op het scherm
      document.getElementById('correctCounter').textContent = correctCount;
      document.getElementById('streakCounter').textContent = streakCount;
    }
  </script>
</body>
</html>
