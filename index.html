<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darts Training App</title>
  <!-- Alleen Tailwind inladen via CDN -->
  <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between font-sans">

  <!-- Navigatiebalk -->
  <nav class="bg-slate-800 text-white p-4 shadow-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="#" class="text-xl font-bold tracking-wider">🎯 DartsApp</a>
    </div>
  </nav>

  <!-- Hoofdcontainer -->
  <main class="flex-grow flex items-center justify-center p-6">
    <div id="root" class="w-full flex justify-center">
      
      <!-- Het Darts Dashboard -->
      <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-md w-full border border-gray-100">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-2">🎯 Darts Training</h1>
        <p class="text-xs text-gray-400 mb-6 uppercase tracking-widest font-semibold">X01 Score Tracker</p>

        <!-- Grote Score Weergave -->
        <div class="bg-slate-900 text-white rounded-2xl py-8 mb-6 shadow-inner relative overflow-hidden">
          <div id="scoreDisplay" class="text-6xl font-black tracking-tight">501</div>
          <div class="text-xs text-slate-400 mt-1 font-medium">RESTERENDE PUNTEN</div>
        </div>

        <!-- Statistieken -->
        <div class="grid grid-cols-2 gap-4 mb-6">
          <div class="bg-slate-50 p-3 rounded-xl border border-gray-100">
            <div id="averageDisplay" class="text-2xl font-bold text-slate-700">0.0</div>
            <div class="text-xs text-gray-400 uppercase font-bold tracking-wider">Gemiddelde</div>
          </div>
          <div class="bg-slate-50 p-3 rounded-xl border border-gray-100">
            <div id="turnsDisplay" class="text-2xl font-bold text-slate-700">0</div>
            <div class="text-xs text-gray-400 uppercase font-bold tracking-wider">Beurten</div>
          </div>
        </div>

        <!-- Checkout Tip Container -->
        <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 mb-6 text-sm text-blue-700 font-medium">
          💡 <span class="font-bold">Advies:</span> <span id="checkoutTip">Scoor zoveel mogelijk (Rijg de T20's aaneen!)</span>
        </div>

        <!-- Invoer Formulier -->
        <form id="scoreForm" class="mb-4">
          <input
            id="turnInput"
            type="number"
            placeholder="Voer beurt-score in (bijv. 60)"
            class="w-full text-center border-2 border-gray-200 rounded-xl py-3 px-4 text-lg font-semibold focus:outline-none focus:border-blue-500 transition mb-3"
            min="0"
            max="180"
            required
          />
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition shadow-md">
            Score Aftrekken
          </button>
        </form>

        <!-- Reset Knop -->
        <button id="resetBtn" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-medium py-2 rounded-xl text-sm transition">
          Herstart (501)
        </button>

        <!-- Geschiedenis -->
        <div id="historyContainer" class="mt-6 text-left border-t border-gray-100 pt-4 hidden">
          <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Laatste worpen</h3>
          <div id="historyList" class="flex flex-wrap gap-2 max-h-20 overflow-y-auto"></div>
        </div>

      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-slate-900 text-gray-400 text-center py-4 text-xs border-t border-slate-800">
    <p>&copy; 2026 Darts Training App. Alle rechten voorbehouden.</p>
  </footer>

  <!-- Pure JavaScript Logica -->
  <script>
    let score = 501;
    let history = [];

    const scoreDisplay = document.getElementById('scoreDisplay');
    const averageDisplay = document.getElementById('averageDisplay');
    const turnsDisplay = document.getElementById('turnsDisplay');
    const checkoutTip = document.getElementById('checkoutTip');
    const turnInput = document.getElementById('turnInput');
    const scoreForm = document.getElementById('scoreForm');
    const resetBtn = document.getElementById('resetBtn');
    const historyContainer = document.getElementById('historyContainer');
    const historyList = document.getElementById('historyList');

    function getCheckoutTip(currentScore) {
      if (currentScore > 170) return "Scoor zoveel mogelijk (Rijg de T20's aaneen!)";
      if (currentScore === 170) return "T20 - T20 - Bullseye";
      if (currentScore === 50) return "Bullseye";
      if (currentScore === 40) return "Tops (D20)";
      if (currentScore === 32) return "D16";
      if (currentScore % 2 === 0 && currentScore <= 40) return "Double " + (currentScore / 2);
      return "Zet hem weg op een mooie dubbel";
    }

    function updateUI() {
      scoreDisplay.textContent = score;
      turnsDisplay.textContent = history.length;
      checkoutTip.textContent = getCheckoutTip(score);

      // Bereken gemiddelde
      if (history.length > 0) {
        const total = history.reduce((a, b) => a + b, 0);
        averageDisplay.textContent = (total / history.length).toFixed(1);
        historyContainer.classList.remove('hidden');
      } else {
        averageDisplay.textContent = "0.0";
        historyContainer.classList.add('hidden');
      }

      // Update geschiedenis tags
      historyList.innerHTML = '';
      history.forEach(s => {
        const span = document.createElement('span');
        span.className = "bg-gray-100 text-gray-700 text-xs font-semibold px-2.5 py-1 rounded-md border border-gray-200";
        span.textContent = s;
        historyList.appendChild(span);
      });
    }

    scoreForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const points = parseInt(turnInput.value, 10);

      if (isNaN(points) || points < 0 || points > 180) {
        alert("Voer een geldige score in tussen 0 en 180.");
        return;
      }

      if (score - points < 0 || score - points === 1) {
        alert("No Score! (Bust)");
        turnInput.value = '';
        return;
      }

      score -= points;
      history.unshift(points); // Voeg toe aan begin van array
      turnInput.value = '';

      if (score === 0) {
        alert("Gefeliciteerd! Je hebt de leg uitgegooid! 🎉");
        score = 501;
        history = [];
      }

      updateUI();
    });

    resetBtn.addEventListener('click', () => {
      score = 501;
      history = [];
      turnInput.value = '';
      updateUI();
    });
  </script>

</body>
</html>
