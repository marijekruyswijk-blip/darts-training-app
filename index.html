<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darts Checkout Training</title>
  <!-- Officiële Tailwind CSS via CDN -->
  <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-950 min-h-screen flex flex-col justify-between font-sans text-slate-100 antialiased selection:bg-emerald-500/30">

  <!-- Navigatiebalk -->
  <nav class="bg-slate-900/80 backdrop-blur-md text-white p-4 sticky top-0 z-50 border-b border-slate-800/60 shadow-lg">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="#" class="text-lg font-black tracking-wider bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent flex items-center gap-2">
        <span>🧠</span> DARTS CHECKOUT PRO
      </a>
    </div>
  </nav>

  <!-- Hoofdcontainer -->
  <main class="flex-grow flex items-center justify-center p-4 relative overflow-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900/60 via-slate-950 to-slate-950">
    <div id="root" class="w-full flex justify-center relative z-10">
      
      <!-- TRAINING CARD -->
      <div class="bg-slate-900/90 backdrop-blur-lg p-6 sm:p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border border-slate-800/80 relative overflow-hidden">
        
        <h1 class="text-2xl font-black text-white tracking-tight mb-1 flex justify-center items-center gap-2">
          🎯 Finish Trainer
        </h1>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-6">Slijp je dartskennis aan</p>

        <!-- Score & Streak Tellers -->
        <div class="grid grid-cols-2 gap-3 mb-6">
          <div class="bg-slate-950/60 border border-slate-800/50 rounded-2xl p-3 flex flex-col items-center justify-center">
            <span class="text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-0.5">Totaal Goed</span>
            <span id="correctCounter" class="text-xl font-black text-emerald-400">0</span>
          </div>
          <div class="bg-slate-950/60 border border-slate-800/50 rounded-2xl p-3 flex flex-col items-center justify-center">
            <span class="text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-0.5">🔥 Win Streak</span>
            <span id="streakCounter" class="text-xl font-black text-orange-400">0</span>
          </div>
        </div>

        <!-- Niveau Selector -->
        <div class="bg-slate-950/80 p-1.5 rounded-2xl border border-slate-800/60 grid grid-cols-3 gap-1 mb-6">
          <button onclick="setLevel('beginner')" id="btn-beg" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white text-xs font-black py-2.5 rounded-xl transition duration-300">Beginner</button>
          <button onclick="setLevel('intermediate')" id="btn-int" class="text-slate-400 hover:text-white text-xs font-bold py-2.5 rounded-xl transition duration-300">Gevorderd</button>
          <button onclick="setLevel('expert')" id="btn-exp" class="text-slate-400 hover:text-white text-xs font-bold py-2.5 rounded-xl transition duration-300">Expert</button>
        </div>

        <!-- Target Display Box -->
        <div class="bg-gradient-to-b from-slate-950 to-slate-900 rounded-2xl py-8 mb-4 border border-slate-800/80 shadow-inner flex flex-col items-center justify-center relative overflow-hidden">
          <div class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1">Gooi deze score uit:</div>
          <div id="targetCheckout" class="text-6xl font-black text-white tracking-tighter">?</div>
          <div id="dartCountLabel" class="text-[10px] text-emerald-400/90 font-black mt-2 tracking-wider uppercase bg-emerald-500/10 px-2.5 py-1 rounded-full border border-emerald-500/20">1 Dart Finish</div>
        </div>

        <!-- Volgend Target Knop -->
        <button onclick="generateTrainingCheckout()" class="w-full bg-slate-950 border border-slate-800 hover:border-slate-700 hover:bg-slate-900 text-slate-200 font-bold py-3 px-4 rounded-xl transition duration-300 text-sm shadow-md mb-6">
          🔄 Volgend Getal
        </button>

        <!-- Antwoord invoeren sectie -->
        <div class="border-t border-slate-800/60 pt-5">
          <p class="text-xs font-black text-slate-400 uppercase tracking-wider mb-3 text-left pl-1">Jouw werproute:</p>
          <form id="guessForm" onsubmit="event.preventDefault(); checkUserGuess();" class="flex gap-2 mb-4">
            <input id="userGuess" type="text" placeholder="Bijv: T20 D20 of D16" class="w-full bg-slate-950 border border-slate-800/80 rounded-xl py-3 px-4 focus:outline-none focus:border-emerald-500 transition font-bold text-center text-white placeholder-slate-600 tracking-wide text-sm" autocomplete="off" required />
            <button type="submit" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-slate-950 font-black px-6 rounded-xl transition duration-300 text-sm tracking-wide">Check</button>
          </form>
          <div id="feedbackBox" class="hidden rounded-xl p-4 text-xs font-bold border transition duration-300 text-left"></div>
        </div>

      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-slate-950 text-slate-600 text-center py-4 text-xs border-t border-slate-900/60 font-medium">
    <p>&copy; 2026 Darts Checkout Training. Alle rechten voorbehouden.</p>
  </footer>

  <!-- Volledige JavaScript Logica -->
  <script>
    let currentLevel = 'beginner';
    let currentTarget = 0;
    let correctCount = 0;
    let streakCount = 0;

    // Officiële database met combinaties
    const checkoutRoutes = {
      2: "D1", 4: "D2", 8: "D4", 12: "D6", 16: "D8", 20: "D10", 24: "D12", 32: "D16", 36: "D18", 40: "D20", 50: "BULLSEYE",
      41: "S9 D16", 45: "S13 D16", 52: "S20 D16", 60: "S20 D20", 64: "T16 D8", 70: "T18 D8", 80: "T20 D10", 90: "T20 D15",
      100: "T20 D20", 110: "T20 S10 D20", 120: "T20 T20 D10", 130: "T20 T20 D5", 140: "T20 T20 D10", 150: "T20 T18 D18", 160: "T20 T20 D20", 170: "T20 T20 BULLSEYE"
    };

    window.onload = function() {
      generateTrainingCheckout();
    };

    function setLevel(level) {
      currentLevel = level;
      
      const inactiveClass = "text-slate-400 hover:text-white text-xs font-bold py-2.5 rounded-xl transition duration-300";
      const activeClass = "bg-gradient-to-r from-emerald-500 to-teal-600 text-slate-950 text-xs font-black py-2.5 rounded-xl transition duration-300 shadow-lg text-white";

      document.getElementById('btn-beg').className = inactiveClass;
      document.getElementById('btn-int').className = inactiveClass;
      document.getElementById('btn-exp').className = inactiveClass;

      if(level === 'beginner') document.getElementById('btn-beg').className = activeClass;
      if(level === 'intermediate') document.getElementById('btn-int').className = activeClass;
      if(level === 'expert') document.getElementById('btn-exp').className = activeClass;

      generateTrainingCheckout();
    }

    // SLIMME GENERATOR: Telt spaties in het antwoord om het exacte aantal pijlen te bepalen!
    function generateTrainingCheckout() {
      const allKeys = Object.keys(checkoutRoutes).map(Number);
      let pool = [];

      if (currentLevel === 'beginner') {
        // Geen spaties = 1 pijl (bijv "D20")
        pool = allKeys.filter(function(k) { return !checkoutRoutes[k].includes(" "); });
      } else if (currentLevel === 'intermediate') {
        // 1 spatie = 2 pijlen (bijv "S9 D16")
        pool = allKeys.filter(function(k) { 
          const spaces = checkoutRoutes[k].split(" ").length - 1;
          return spaces === 1; 
        });
      } else {
        // 2 spaties = 3 pijlen (bijv "T20 T20 D10")
        pool = allKeys.filter(function(k) { 
          const spaces = checkoutRoutes[k].split(" ").length - 1;
          return spaces === 2; 
        });
      }

      currentTarget = pool[Math.floor(Math.random() * pool.length)];
      document.getElementById('targetCheckout').textContent = currentTarget;
      
      const label = document.getElementById('dartCountLabel');
      if(currentLevel === 'beginner') label.textContent = "1 Dart Finish";
      if(currentLevel === 'intermediate') label.textContent = "2 Dart Finish";
      if(currentLevel === 'expert') label.textContent = "3 Dart Finish";

      document.getElementById('feedbackBox').classList.add('hidden');
      document.getElementById('userGuess').value = '';
      document.getElementById('userGuess').focus();
    }

    function checkUserGuess() {
      const userInput = document.getElementById('userGuess').value.trim().toUpperCase().replace(/\s+/g, ' ');
      const correctAnswer = checkoutRoutes[currentTarget].toUpperCase();
      const feedback = document.getElementById('feedbackBox');
      
      feedback.classList.remove('hidden', 'bg-emerald-500/10', 'border-emerald-500/30', 'text-emerald-400', 'bg-rose-500/10', 'border-rose-500/30', 'text-rose-400');
      
      if(userInput === correctAnswer) {
        feedback.classList.add('bg-emerald-500/10', 'border-emerald-500/30', 'text-emerald-400');
        feedback.innerHTML = "🎉 <b>Correct!</b> Route vlekkeloos uitgevoerd.";
        correctCount++;
        streakCount++;
      } else {
        feedback.classList.add('bg-rose-500/10', 'border-rose-500/30', 'text-rose-400');
        feedback.innerHTML = "❌ <b>Onjuist.</b> De juiste route is: <span class='underline font-black text-white ml-1'>" + checkoutRoutes[currentTarget] + "</span>";
        streakCount = 0;
      }

      document.getElementById('correctCounter').textContent = correctCount;
      document.getElementById('streakCounter').textContent = streakCount;
    }
  </script>
</body>
</html>
