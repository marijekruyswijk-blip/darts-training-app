<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mijn Vercel Website</title>
  <!-- Tailwind CSS koppeling -->
  <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between font-sans">

  <!-- Navigatiebalk -->
  <nav class="bg-slate-800 text-white p-4 shadow-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <a href="#" class="text-xl font-bold tracking-wider">MijnLogo</a>
      <div class="space-x-4 text-sm font-medium">
        <a href="#" class="hover:text-blue-400 transition">Home</a>
        <a href="#" class="hover:text-blue-400 transition">Diensten</a>
        <a href="#" class="hover:text-blue-400 transition">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Hoofdinhoud (de container voor JavaScript) -->
  <main class="flex-grow flex items-center justify-center p-6">
    <div id="root" class="w-full flex justify-center">
      <!-- JavaScript vult dit hieronder dynamisch in -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-slate-900 text-gray-400 text-center py-4 text-xs border-t border-slate-800">
    <p>&copy; 2026 Mijn Website. Alle rechten voorbehouden.</p>
  </footer>

  <!-- JavaScript voor de Root Div -->
  <script>
    // Selecteer de root div
    const rootDiv = document.getElementById('root');
    
    // Maak de HTML structuur die in de root div moet komen
    const template = `
      <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm border border-gray-100">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-3">Gelukt!</h1>
        <p class="text-gray-500 mb-6">Jouw index.html staat succesvol live op Vercel via de main branch.</p>
        <button id="alertBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition shadow-lg shadow-blue-500/20">
          Klik op mij
        </button>
      </div>
    `;
    
    // Plaats de structuur in de root div
    rootDiv.innerHTML = template;

    // Voeg de klik-actie toe aan de knop
    document.getElementById('alertBtn').addEventListener('click', () => {
      alert('Geweldig! De JavaScript-koppeling en Vercel werken perfect.');
    });
  </script>

</body>
</html>
